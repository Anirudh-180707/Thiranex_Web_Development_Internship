<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Checkout</title>
<link rel="stylesheet" href="style.css">

</head>
<body>

<header>

<nav class="navbar">

<h1>TechStore</h1>

</nav>

</header>

<div class="checkout-container">

<h2>Checkout</h2>

<form id="checkout-form">

<input
type="text"
placeholder="Full Name"
required>

<input
type="email"
placeholder="Email Address"
required>

<input
type="text"
placeholder="Delivery Address"
required>

<select id="payment-method">

<option>
Select Payment Method
</option>

<option>
UPI
</option>

<option>
Credit Card
</option>

<option>
Debit Card
</option>

<option>
Cash On Delivery
</option>

</select>

<button type="submit">

Place Order

</button>

</form>

</div>

<script src="checkout.js"></script>

</body>
</html>
