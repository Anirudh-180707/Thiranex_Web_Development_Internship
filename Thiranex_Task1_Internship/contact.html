<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Contact me through this accessible contact form.">
    <meta name="keywords" content="Contact, Portfolio, Web Developer">
    <meta name="author" content="Anirudh">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Portfolio | Contact</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header role="banner">
    <h1>My Portfolio</h1>

    <nav aria-label="Main Navigation">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" aria-current="page">Contact</a></li>
        </ul>
    </nav>
</header>

<main>

    <section aria-labelledby="contact-heading" class="contact-section">

        <h2 id="contact-heading">Get In Touch</h2>

        <p>
            Have a project, internship opportunity, or simply want to connect?
            Feel free to send me a message.
        </p>

        <form aria-label="Contact Form" class="contact-form">

            <div class="form-group">
                <label for="name">Full Name</label>

                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Enter your full name"
                    required
                    aria-required="true">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email address"
                    required
                    aria-required="true">
            </div>

            <div class="form-group">
                <label for="subject">Subject</label>

                <input
                    type="text"
                    id="subject"
                    name="subject"
                    placeholder="Enter subject">
            </div>

            <div class="form-group">
                <label for="message">Message</label>

                <textarea
                    id="message"
                    name="message"
                    rows="6"
                    placeholder="Write your message here..."
                    required
                    aria-required="true"></textarea>
            </div>

            <button type="submit">Send Message</button>

        </form>

    </section>

</main>

<footer>
    <p>&copy; 2026 My Portfolio. All Rights Reserved.</p>
</footer>

</body>
</html>
